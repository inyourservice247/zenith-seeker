<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith — My Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
background:#F4F1EA;
font-family:'DM Sans',sans-serif;
color:#0F1A2E;
min-height:100vh;
}

a{text-decoration:none;color:inherit}

.a-nav{
position:fixed;
top:0;
left:0;
right:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 24px;
background:#F4F1EA;
border-bottom:1px solid #DDD8CC;
z-index:100;
}

.a-logo{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
font-size:14px;
}

.logo-mark{
width:32px;
height:32px;
background:#1D4ED8;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-family:'Space Mono',monospace;
font-weight:700;
color:#fff;
}

.a-nav-name{
font-size:13px;
color:#7a7060;
}

.page{
padding:100px 24px 60px;
max-width:720px;
margin:0 auto;
}

.welcome{
margin-bottom:34px;
}

.welcome-label{
font-size:11px;
letter-spacing:2px;
font-weight:600;
color:#1D4ED8;
margin-bottom:10px;
}

.welcome-title{
font-family:'Playfair Display',serif;
font-size:clamp(26px,5vw,38px);
line-height:1.2;
margin-bottom:6px;
}

.welcome-sub{
font-size:15px;
color:#7a7060;
line-height:1.6;
}

.loading{
text-align:center;
padding:60px 0;
font-size:14px;
color:#7a7060;
}

.empty{
text-align:center;
padding:60px 0;
}

.empty-icon{
font-size:40px;
margin-bottom:14px;
}

.empty-title{
font-size:18px;
font-weight:600;
margin-bottom:8px;
}

.empty-sub{
font-size:14px;
color:#7a7060;
line-height:1.6;
margin-bottom:24px;
}

.btn-blue{
padding:14px 26px;
background:#1D4ED8;
border:none;
color:#fff;
border-radius:10px;
font-weight:600;
cursor:pointer;
font-family:'DM Sans',sans-serif;
}

.question-card{
background:#fff;
border:1px solid #DDD8CC;
border-radius:14px;
margin-bottom:18px;
overflow:hidden;
}

.q-card-header{
padding:18px 20px;
border-bottom:1px solid #EEE8DC;
}

.q-meta{
display:flex;
align-items:center;
gap:8px;
margin-bottom:10px;
flex-wrap:wrap;
}

.q-field{
font-size:10px;
letter-spacing:1px;
padding:4px 8px;
background:#EEF2FF;
color:#1D4ED8;
border-radius:6px;
font-weight:600;
}

.q-status{
font-size:10px;
font-weight:600;
padding:4px 8px;
border-radius:6px;
}

.q-status.ai{
background:#E7F7EF;
color:#0EA371;
}

.q-status.forwarded{
background:#FFF4E5;
color:#F59E0B;
}

.q-status.answered{
background:#E7F7EF;
color:#0EA371;
}

.q-date{
margin-left:auto;
font-size:11px;
color:#7a7060;
}

.q-question{
font-size:15px;
line-height:1.5;
font-weight:500;
}

.q-card-body{
padding:18px 20px;
}

.answer-label{
font-size:10px;
font-weight:600;
letter-spacing:1px;
margin-bottom:10px;
}

.answer-label.ai{color:#1D4ED8}
.answer-label.expert{color:#0EA371}

.answer-text{
font-size:14px;
line-height:1.7;
color:#2b3446;
}

.answer-text strong{
font-weight:600;
}

.waiting{
display:flex;
align-items:center;
gap:10px;
padding:14px 0;
}

.waiting-dot{
width:8px;
height:8px;
border-radius:50%;
background:#F59E0B;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:1}
50%{opacity:.4}
}

.waiting-text{
font-size:13px;
color:#7a7060;
}

.counsellor-tag{
display:flex;
align-items:center;
gap:8px;
margin-top:14px;
padding-top:14px;
border-top:1px solid #EEE8DC;
}

.counsellor-av{
width:28px;
height:28px;
border-radius:50%;
background:#E7F7EF;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
font-weight:600;
color:#0EA371;
}

.counsellor-name{
font-size:12px;
color:#7a7060;
}

.counsellor-name strong{
color:#0F1A2E;
}

.cta-card{
background:#EEF2FF;
border:1px solid #C7D2FE;
border-radius:14px;
padding:24px;
margin-top:10px;
margin-bottom:24px;
text-align:center;
}

.cta-card-title{
font-size:16px;
font-weight:600;
margin-bottom:6px;
}

.cta-card-sub{
font-size:14px;
color:#7a7060;
line-height:1.6;
margin-bottom:18px;
}

.cta-card-btn{
padding:12px 24px;
background:#1D4ED8;
color:#fff;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.toast{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
background:#0EA371;
color:#fff;
padding:12px 24px;
border-radius:10px;
font-size:14px;
display:none;
}
</style>
</head>

<body>

<nav class="a-nav">
<div class="a-logo">
<div class="logo-mark">Z</div>
<div>Zenith Foundation</div>
</div>
<div class="a-nav-name" id="navName"></div>
</nav>

<div class="page">

<div class="welcome">
<div class="welcome-label">YOUR DASHBOARD</div>
<h1 class="welcome-title" id="welcomeTitle">Your career roadmap</h1>
<p class="welcome-sub" id="welcomeSub">Your questions, AI answers, and expert guidance — all in one place.</p>
</div>

<div id="content">
<div class="loading">Loading your session...</div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
const BACKEND = 'https://zenith-backend-mu.vercel.app/api';
const seekerId = localStorage.getItem('zenith_seeker_id');
const seekerName = localStorage.getItem('zenith_seeker_name');
const careerStage = localStorage.getItem('zenith_career_stage');

if (seekerName) {
  document.getElementById('navName').textContent = seekerName;
  document.getElementById('welcomeTitle').textContent = 'Hey ' + seekerName.split(' ')[0] + '.';
  document.getElementById('welcomeSub').textContent = 'Here\\'s everything from your Zenith sessions.';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function getStatusLabel(status) {
  if (status === 'ai_answered') return '<span class="q-status ai">AI Answered</span>';
  if (status === 'forwarded') return '<span class="q-status forwarded">Awaiting Expert</span>';
  if (status === 'counsellor_answered') return '<span class="q-status answered">Expert Answered</span>';
  return '';
}

function cleanText(text) {
  if (!text) return '';
  return text
    .replace(/\\*\\*(.*?)\\*\\*/g, '<strong>$1</strong>')
    .replace(/\\*(.*?)\\*/g, '<em>$1</em>')
    .replace(/\\n/g, '<br>');
}

async function trackCtaClick() {
  if (!seekerId || !careerStage) return;
  try {
    await fetch(`${BACKEND}/track-cta`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ seeker_id: seekerId, career_stage: careerStage })
    });
  } catch (e) {}
  showToast('Thanks for your interest! We will reach out to you personally.');
}

async function loadDashboard() {
  const content = document.getElementById('content');

  if (!seekerId) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔒</div>
        <div class="empty-title">No session found</div>
        <div class="empty-sub">It looks like you haven't started a session yet. Go back and tell Zenith your situation.</div>
        <button class="btn-blue" onclick="window.location.href='index.html'">Get Started →</button>
      </div>`;
    return;
  }

  try {
    const res = await fetch(`${BACKEND}/get-dashboard?seeker_id=${seekerId}`);
    const data = await res.json();

    if (!data.success) throw new Error(data.error);

    const { questions } = data;

    if (!questions || questions.length === 0) {
      content.innerHTML = `
        <div class="empty">
          <div class="empty-icon">💬</div>
          <div class="empty-title">No questions yet</div>
          <div class="empty-sub">Start a conversation with Zenith AI and your roadmap will appear here.</div>
          <button class="btn-blue" onclick="history.back()">Talk to Zenith AI →</button>
        </div>`;
      return;
    }

    let html = '';

    questions.forEach(q => {
      const aiAnswerClean = cleanText(q.ai_answer);
      const hasExpertAnswer = q.answers && q.answers.length > 0;
      const expertAnswer = hasExpertAnswer ? q.answers[0] : null;
      const counsellorName = expertAnswer?.counsellors?.name || 'Expert Counsellor';
      const counsellorInitials = counsellorName.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();

      html += `
        <div class="question-card">
          <div class="q-card-header">
            <div class="q-meta">
              <span class="q-field">${q.field_tag || 'General'}</span>
              ${getStatusLabel(q.status)}
              <span class="q-date">${formatDate(q.created_at)}</span>
            </div>
            <div class="q-question">${q.reframed_question || 'Career guidance session'}</div>
          </div>
          <div class="q-card-body">`;

      if (q.ai_answer) {
        html += `
            <div class="answer-label ai">ZENITH AI ROADMAP</div>
            <div class="answer-text">${aiAnswerClean}</div>`;
      }

      if (hasExpertAnswer) {
        html += `
            <div style="margin-top:20px;padding-top:20px;border-top:1px solid #EEE8DC">
              <div class="answer-label expert">EXPERT COUNSELLOR ANSWER</div>
              <div class="answer-text">${cleanText(expertAnswer.answer_text)}</div>
              <div class="counsellor-tag">
                <div class="counsellor-av">${counsellorInitials}</div>
                <div class="counsellor-name">Answered by <strong>${counsellorName}</strong></div>
              </div>
            </div>`;
      } else if (q.status === 'forwarded') {
        html += `
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid #EEE8DC">
              <div class="waiting">
                <div class="waiting-dot"></div>
                <div class="waiting-text">Your question has been forwarded to an expert counsellor. You'll receive an email when they respond.</div>
              </div>
            </div>`;
      }

      html += `</div></div>`;
    });

    html += `
      <div class="cta-card">
        <div class="cta-card-title">Want deeper, personalised guidance?</div>
        <div class="cta-card-sub">Book a 1-on-1 session with an expert counsellor who specialises in your exact field and situation.</div>
        <button class="cta-card-btn" onclick="trackCtaClick()">I'm interested in 1:1 coaching</button>
      </div>`;

    content.innerHTML = html;

  } catch (e) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Could not load dashboard</div>
        <div class="empty-sub">There was a connection issue. Please try refreshing the page.</div>
        <button class="btn-blue" onclick="loadDashboard()">Try Again</button>
      </div>`;
  }
}

loadDashboard();
</script>

</body>
</html>
